name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: khetify-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: khetify-backend/package-lock.json
      - run: npm ci
      - run: npm test
        env:
          JWT_SECRET: test-secret

  frontend:
    name: Frontend — build + lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: khetifyApp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: khetifyApp/package-lock.json
      - run: npm ci
      - run: npx eslint . || true   # report lint, don't block the build yet
      - run: npm run build
